services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crossborder_ai
      POSTGRES_USER: crossborder
      POSTGRES_PASSWORD: crossborder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cross-border-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - cross-border-net

  fastapi:
    build:
      context: .
      secrets:
        - guardrails_token
    command: sh -c "python scripts/ensure_guardrails_registry.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      WORKFLOW_BACKEND: celery
      DATABASE_URL: postgresql+psycopg://crossborder:crossborder@postgres:5432/crossborder_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_GLOBAL_AUTO_INSTRUMENTATION_ENABLED: ${OTEL_GLOBAL_AUTO_INSTRUMENTATION_ENABLED:-false}
      OTEL_HTTPX_INSTRUMENTATION_ENABLED: ${OTEL_HTTPX_INSTRUMENTATION_ENABLED:-false}
      OTEL_REDIS_INSTRUMENTATION_ENABLED: ${OTEL_REDIS_INSTRUMENTATION_ENABLED:-false}
      OTEL_SQLALCHEMY_INSTRUMENTATION_ENABLED: ${OTEL_SQLALCHEMY_INSTRUMENTATION_ENABLED:-false}
      OTEL_CELERY_INSTRUMENTATION_ENABLED: ${OTEL_CELERY_INSTRUMENTATION_ENABLED:-false}
      FASTAPI_OTEL_AUTO_INSTRUMENTATION_ENABLED: ${FASTAPI_OTEL_AUTO_INSTRUMENTATION_ENABLED:-false}
      OPENINFERENCE_CREWAI_ENABLED: ${OPENINFERENCE_CREWAI_ENABLED:-false}
      OPENINFERENCE_LITELLM_ENABLED: ${OPENINFERENCE_LITELLM_ENABLED:-true}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://phoenix:6006/v1/traces}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-cross-border-ai-dev}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-cross-border-ai}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    networks:
      - cross-border-net

  celery_worker:
    build:
      context: .
      secrets:
        - guardrails_token
    command: sh -c "python scripts/ensure_guardrails_registry.py && celery -A celery_worker.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=500"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://crossborder:crossborder@postgres:5432/crossborder_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_GLOBAL_AUTO_INSTRUMENTATION_ENABLED: ${OTEL_GLOBAL_AUTO_INSTRUMENTATION_ENABLED:-false}
      OTEL_HTTPX_INSTRUMENTATION_ENABLED: ${OTEL_HTTPX_INSTRUMENTATION_ENABLED:-false}
      OTEL_REDIS_INSTRUMENTATION_ENABLED: ${OTEL_REDIS_INSTRUMENTATION_ENABLED:-false}
      OTEL_SQLALCHEMY_INSTRUMENTATION_ENABLED: ${OTEL_SQLALCHEMY_INSTRUMENTATION_ENABLED:-false}
      OTEL_CELERY_INSTRUMENTATION_ENABLED: ${OTEL_CELERY_INSTRUMENTATION_ENABLED:-false}
      FASTAPI_OTEL_AUTO_INSTRUMENTATION_ENABLED: ${FASTAPI_OTEL_AUTO_INSTRUMENTATION_ENABLED:-false}
      OPENINFERENCE_CREWAI_ENABLED: ${OPENINFERENCE_CREWAI_ENABLED:-false}
      OPENINFERENCE_LITELLM_ENABLED: ${OPENINFERENCE_LITELLM_ENABLED:-true}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://phoenix:6006/v1/traces}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-cross-border-ai-dev}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-cross-border-ai}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    networks:
      - cross-border-net

  flower:
    image: mher/flower:latest
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - cross-border-net

volumes:
  postgres_data:
  redis_data:

secrets:
  guardrails_token:
    environment: GUARDRAILS_TOKEN

networks:
  cross-border-net:
    name: cross-border-net
