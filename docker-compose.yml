services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crossborder_ai
      POSTGRES_USER: crossborder
      POSTGRES_PASSWORD: crossborder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cross-border-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - cross-border-net

  guardrails-toxic:
    build:
      context: ./docker/guardrails-toxic
      secrets:
        - guardrails_token
    ports:
      - "127.0.0.1:8011:8011"
    environment:
      HF_HOME: /models/huggingface
      HF_HUB_CACHE: /models/huggingface/hub
      NLTK_DATA: /models/nltk
    volumes:
      - guardrails_toxic_huggingface:/models/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - cross-border-net

  fastapi:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      WORKFLOW_BACKEND: celery
      DATABASE_URL: postgresql+psycopg://crossborder:crossborder@postgres:5432/crossborder_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://phoenix:6006/v1/traces}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-cross-border-ai-dev}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-cross-border-ai}
      WORKFLOW_GUARDRAILS_TOXIC_URL: http://guardrails-toxic:8011/validate
      WORKFLOW_GUARDRAILS_TOXIC_TIMEOUT_SECONDS: ${WORKFLOW_GUARDRAILS_TOXIC_TIMEOUT_SECONDS:-15}
    depends_on:
      - postgres
      - redis
      - guardrails-toxic
    volumes:
      - .:/app
    networks:
      - cross-border-net

  celery_worker:
    build: .
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=500
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://crossborder:crossborder@postgres:5432/crossborder_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://phoenix:6006/v1/traces}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-cross-border-ai-dev}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-cross-border-ai}
      WORKFLOW_GUARDRAILS_TOXIC_URL: http://guardrails-toxic:8011/validate
      WORKFLOW_GUARDRAILS_TOXIC_TIMEOUT_SECONDS: ${WORKFLOW_GUARDRAILS_TOXIC_TIMEOUT_SECONDS:-15}
    depends_on:
      - postgres
      - redis
      - guardrails-toxic
    volumes:
      - .:/app
    networks:
      - cross-border-net

  flower:
    image: mher/flower:latest
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - cross-border-net

volumes:
  postgres_data:
  redis_data:
  guardrails_toxic_huggingface:

secrets:
  guardrails_token:
    environment: GUARDRAILS_TOKEN

networks:
  cross-border-net:
    name: cross-border-net
