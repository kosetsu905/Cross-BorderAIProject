version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crossborder_ai
      POSTGRES_USER: crossborder
      POSTGRES_PASSWORD: crossborder
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  fastapi:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      WORKFLOW_BACKEND: celery
      DATABASE_URL: postgresql+psycopg://crossborder:crossborder@postgres:5432/crossborder_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  celery_worker:
    build: .
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=500
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://crossborder:crossborder@postgres:5432/crossborder_ai
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  flower:
    image: mher/flower:latest
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker

volumes:
  postgres_data:
  redis_data:
