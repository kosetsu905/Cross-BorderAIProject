research_and_strategy:
  description: >
    Research trending topics, competitor content, search intent, audience needs, and platform context
    for {product_category} in {target_markets}. Use that research to produce a compact content blueprint
    for {subject}, including recommended angles, article structure, multi-engine SEO keyword themes,
    visual localization cues, cultural risk notes, and platform distribution guidance for
    {target_languages} and {platforms}. Keep guidance clearly separated by requested language and
    market so downstream language-specific generation can use only the relevant section.
    Reddit GEO context for AI-agent discoverability and manual Reddit publishing:
    {reddit_geo_context_summary}
    Brand/entity context for Reddit GEO:
    Brand name: {brand_name_summary}
    Product URL: {product_url_summary}
    Brand voice guidance:
    {brand_voice_summary}
    Primary keyword seeds:
    {primary_keywords_summary}
    Ground the blueprint in these user-provided product features when available:
    {product_features_summary}
    Treat product features as first-party input. Use them to shape article angles, examples, CTAs, and benefit-led
    messaging, but do not exaggerate proof points beyond what the user provided.
  expected_output: "A concise research-backed content blueprint with market insights, Reddit GEO guidance when enabled, multi-engine SEO themes, visual localization guidance, article structure, cultural risk notes, and platform distribution notes."

content_creation_and_qa:
  description: >
    Using this research and strategy blueprint: {strategy_context}
    Write one full localized blog/article in markdown format about {subject} for the requested language
    {target_language} and target market scope {target_market}. Then generate localized platform-specific social media posts for {target_language}
    that cover the requested platforms: {platforms}.
    Keep the output compact and parseable. Hard limits: localized_article.title must be at most
    {content_title_max_chars} characters; localized_article.article must be at most
    {content_article_max_chars} characters; each social_media_posts item must be at most
    {content_social_post_max_chars} characters; seo_keywords must contain at most
    {content_seo_keywords_max_count} short keywords; compliance_notes must be at most
    {content_compliance_notes_max_chars} characters. Return at most one social post per requested
    platform. Do not add long background analysis, research notes, drafts, outlines, or duplicate
    variants outside the required structured fields.
    Ensure cultural adaptation, useful hashtags or mentions where appropriate, clear CTAs, SEO quality,
    and regional compliance notes for {target_markets}. Do a final self-review before returning the
    structured output. Treat this as an independent single-language deliverable: use only strategy details
    relevant to {target_language} and {target_market}; do not discuss other requested languages, markets,
    or cultures unless they are explicitly relevant to this target language and market scope.
    Product features to incorporate where relevant:
    {product_features_summary}
    Brand voice to maintain:
    {brand_voice_summary}
    Primary keyword seeds to consider:
    {primary_keywords_summary}
    Reddit GEO enabled:
    {reddit_geo_enabled}
    Reddit GEO context:
    {reddit_geo_context_summary}
    Brand/entity context:
    Brand name: {brand_name_summary}
    Product URL: {product_url_summary}
    Make the article concrete by connecting these features to practical user needs, usage scenarios, and CTAs.
    If no product features are provided, avoid inventing specific capabilities.
    The article, social posts, SEO keywords, and compliance notes must be written in {target_language};
    do not mix in another language except unavoidable brand names, product names, URLs, or standard
    platform hashtags. Do not invent named local brands, exact market statistics, regulations,
    material innovations, or cultural claims. If the strategy does not provide a verified source
    for a specific claim, use cautious generic language such as "some brands", "many consumers",
    or "consider checking certified materials" rather than presenting it as factual local market data.
    Do not output placeholder brand names such as Brand A, Marca A, or [brand name].
    If you include multimodal, SEO metadata, cultural risk, or visual asset fields, treat them as
    planning metadata only. Do not claim that an image was generated or scored; external image
    generation and visual scoring are controlled by the workflow after your task completes.
    If Reddit GEO enabled is true, include reddit_geo_posts with one Reddit-ready post draft for
    this language and target market. The Reddit post must be for manual review before publishing,
    use transparent weak-brand disclosure, avoid impersonating a neutral user, avoid hard-sell CTA,
    cite only source_ids from the Reddit GEO context, include body_without_link, and include at most
    one natural product_url reference in body when a valid Product URL was provided. Do not invent a
    subreddit if no source supports it; use manual_subreddit_review_required and explain that in
    moderation_notes. Do not claim that Reddit users agree with any point unless the source context
    explicitly supports it. All reddit_geo_posts fields that contain prose, including title_options,
    body, body_without_link, disclosure_note, and moderation_notes, must be written in
    {target_language}; only brand names, product names, URLs, source_ids, and standard subreddit names
    may remain in another language. Never output placeholder links such as [your product link].
  expected_output: "A compact final structured single-language content package with one bounded localized_article, at most one bounded social_media_posts item per requested platform, up to 12 seo_keywords, concise compliance_notes, optional reddit_geo_posts when Reddit GEO is enabled, and optional multimodal/SEO/compliance planning metadata."
