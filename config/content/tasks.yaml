trend_research:
  description: >
    Research trending topics, competitor content, and search intent for {product_category} in {target_markets}.
    Identify high-volume keywords, content gaps, and viral angles across {platforms}.
  expected_output: "A comprehensive trend report with keywords, competitor analysis, and content opportunity insights."

content_strategy:
  description: >
    Using the trend research, develop a content strategy for {product_category} targeting {target_languages}.
    Define audience persona, core message, SEO focus, content structure, and distribution plan.
  expected_output: "A detailed content blueprint outlining structure, tone, SEO targets, and platform distribution strategy."

content_creation:
  description: >
    Write one full localized blog/article in markdown format about {subject} for every language in {target_languages}.
    Then generate localized platform-specific social media posts that cover every language in {target_languages}
    and every platform in {platforms}.
    Ensure cultural adaptation, proper hashtags, and clear CTAs.
    Do not collapse languages into a single article. If target_languages contains de, ja, en, and zh-CN,
    the final output must contain four localized articles, and social posts should include all requested languages
    and all requested platforms without requiring every language-platform combination.
  expected_output: "A complete multilingual content package with one localized article per requested language and localized social posts covering all requested languages and platforms."

quality_assurance:
  description: >
    Review the article and social posts for SEO optimization, brand voice consistency, cultural accuracy, and compliance.
    Fix any issues, ensure proper formatting, and validate against {target_markets} regulations.
    Confirm that localized_articles covers every language in {target_languages}.
    Confirm that social_media_posts includes all requested languages and all requested platforms.
  expected_output: "Final polished content package with SEO keywords, compliance notes, and structured social posts."
