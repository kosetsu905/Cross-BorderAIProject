timezone_holiday_mapping:
  description: >
    Map the target regions ({target_markets}) to their local timezones, upcoming holidays,
    and peak shopping seasons. Account for daylight saving transitions and regional business hours.
    Provide a structured calendar baseline for {event_type} planning within {preferred_launch_window}.
    Current date is {current_date}. Do not use historical dates or holiday examples from prior years.
  expected_output: "A regional calendar matrix with timezones, holidays, peak periods, and optimal local launch windows within the requested launch window."

campaign_event_alignment:
  description: >
    Align the proposed {event_list} with the regional calendar baseline.
    Sequence launches to avoid market cannibalization, synchronize with marketing and sales targets,
    and prioritize high-impact regional windows.
    Every proposed event date must be inside {preferred_launch_window} and must not be before {current_date}.
  expected_output: "A sequenced event calendar with regional prioritization, alignment rationale, and business objective mapping. All dates must be inside the requested launch window."

conflict_resolution_optimization:
  description: >
    Review the sequenced calendar for overlaps, resource bottlenecks, and platform scheduling limits.
    Resolve conflicts, adjust timings, and output a finalized, conflict-free schedule.
    Any adjusted date must remain inside {preferred_launch_window}; never move events to historical years.
  expected_output: "An optimized, conflict-free event schedule with resource allocation notes and adjustment rationale, with all dates inside the requested launch window."

notification_reminder_setup:
  description: >
    Design a multi-channel reminder workflow for the finalized schedule.
    Include T-7d, T-3d, T-1d, and launch-day notifications across Email, Slack, SMS, and Calendar.
    Add escalation rules and compliance checks for each region.
    Final optimized_schedule start_utc and end_utc values must be ISO-like UTC timestamps inside {preferred_launch_window}.
    Do not infer dates from generic holiday names unless those dates fall within the requested window.
    If timezone/holiday tools return development fallback data, explicitly mark data_source as development_fallback,
    set confidence_level to Low or Illustrative, and add assumptions explaining that holiday and timezone context should
    be verified with a live provider before production scheduling.
  expected_output: "A structured notification plan with channel routing, timing triggers, escalation paths, compliance notes, data-source caveats, and a final schedule constrained to the requested launch window."
