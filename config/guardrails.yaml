mode: monitor
config_version: 2
evidence_storage: masked_only
human_override_requires_reason: true

defaults:
  on_fail: noop
  capture_raw: false

guards:
  support:
    input:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: detect_pii
          hub: hub://guardrails/detect_pii
          class_name: DetectPII
          entities:
            - EMAIL_ADDRESS
            - PHONE_NUMBER
          policy: mask
          severity: medium
        - id: prompt_injection
          hub: hub://sainatha/prompt_injection_detector
          class_name: PromptInjectionDetector
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_LLM_CALLABLE:gpt-4o-mini}
            threshold: 0.8
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:internal discount code|guaranteed refund without approval)).*$"
            match_type: fullmatch
          policy: block
          severity: high
    output:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: detect_pii
          hub: hub://guardrails/detect_pii
          class_name: DetectPII
          entities:
            - EMAIL_ADDRESS
            - PHONE_NUMBER
          policy: mask
          severity: medium
        - id: toxic_language
          hub: hub://guardrails/toxic_language
          class_name: ToxicLanguage
          remote_url_env: WORKFLOW_GUARDRAILS_TOXIC_URL
          args:
            threshold: 0.5
            validation_method: sentence
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:internal discount code|guaranteed refund without approval)).*$"
            match_type: fullmatch
          policy: review_required
          severity: high
        - id: provenance_llm
          hub: hub://guardrails/provenance_llm
          class_name: ProvenanceLLM
          enabled_when: grounding_context_available
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_LLM_CALLABLE:gpt-4o-mini}
            validation_method: sentence
            top_k: 3
          policy: review_required
          severity: high
    action:
      gmail.send:
        high: review_required
        critical: block
      whatsapp.send:
        high: review_required
        critical: block

  content:
    input:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: prompt_injection
          hub: hub://sainatha/prompt_injection_detector
          class_name: PromptInjectionDetector
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_LLM_CALLABLE:gpt-4o-mini}
            threshold: 0.8
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:unverified medical cure|guaranteed income)).*$"
            match_type: fullmatch
          policy: block
          severity: high
    output:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: toxic_language
          hub: hub://guardrails/toxic_language
          class_name: ToxicLanguage
          remote_url_env: WORKFLOW_GUARDRAILS_TOXIC_URL
          args:
            threshold: 0.5
            validation_method: sentence
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:unverified medical cure|guaranteed income)).*$"
            match_type: fullmatch
          policy: review_required
          severity: high
        - id: provenance_llm
          hub: hub://guardrails/provenance_llm
          class_name: ProvenanceLLM
          enabled_when: grounding_context_available
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_LLM_CALLABLE:gpt-4o-mini}
            validation_method: sentence
            top_k: 3
          policy: review_required
          severity: high
    action:
      publish:
        high: review_required
        critical: block
