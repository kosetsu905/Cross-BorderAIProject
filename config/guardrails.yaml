mode: monitor
config_version: 1
evidence_storage: masked_only
human_override_requires_reason: true

defaults:
  on_fail: noop
  capture_raw: false

guards:
  support:
    input:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          on_fail: noop
          policy: block
          severity: critical
        - id: detect_pii
          hub: hub://guardrails/detect_pii
          entities:
            - EMAIL_ADDRESS
            - PHONE_NUMBER
          on_fail: noop
          policy: mask
          severity: medium
        - id: prompt_injection
          builtin: prompt_injection
          policy: monitor
          severity: high
    output:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          on_fail: noop
          policy: block
          severity: critical
        - id: detect_pii
          hub: hub://guardrails/detect_pii
          entities:
            - EMAIL_ADDRESS
            - PHONE_NUMBER
          on_fail: noop
          policy: mask
          severity: medium
        - id: toxic_language
          hub: hub://guardrails/toxic_language
          enable_ai_runtime: false
          threshold: 0.5
          validation_method: sentence
          on_fail: noop
          policy: block
          severity: high
        - id: provenance_llm
          hub: hub://guardrails/provenance_llm
          enabled_when: grounding_context_available
          validation_method: sentence
          top_k: 3
          on_fail: noop
          policy: review_required
          severity: high
    action:
      gmail.send:
        high: review_required
        critical: block
      whatsapp.send:
        high: review_required
        critical: block

  content:
    input:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          on_fail: noop
          policy: block
          severity: critical
        - id: prompt_injection
          builtin: prompt_injection
          policy: monitor
          severity: high
    output:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          on_fail: noop
          policy: block
          severity: critical
        - id: toxic_language
          hub: hub://guardrails/toxic_language
          enable_ai_runtime: false
          threshold: 0.5
          validation_method: sentence
          on_fail: noop
          policy: block
          severity: high
        - id: provenance_llm
          hub: hub://guardrails/provenance_llm
          enabled_when: grounding_context_available
          validation_method: sentence
          top_k: 3
          on_fail: noop
          policy: review_required
          severity: high
    action:
      publish:
        high: review_required
        critical: block
