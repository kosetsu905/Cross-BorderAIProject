mode: monitor
config_version: 4
evidence_storage: masked_only
human_override_requires_reason: true

defaults:
  on_fail: noop
  capture_raw: false

detector_pipeline:
  version: guardrail-local-v2
  raw_local_first:
    - secrets_present
    - detect_pii
  semantic:
    thresholds:
      prompt_injection:
        en: 0.84
        zh: 0.80
      toxic_language:
        en: 0.82
        zh: 0.78
      forbidden_terms:
        default: 0.88
      provenance_llm:
        default: 0.86
    qwen:
      enabled: true
      profile: ${WORKFLOW_GUARDRAILS_SEMANTIC_MODEL:openrouter_qwen37}
      timeout_seconds: 8
      max_attempts: 3
      fail_closed_actions:
        - gmail.send
        - whatsapp.send
        - sms.send
        - publish

guards:
  support:
    input:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: detect_pii
          hub: hub://guardrails/detect_pii
          class_name: DetectPII
          entities:
            - EMAIL_ADDRESS
            - PHONE_NUMBER
            - IP_ADDRESS
            - CREDIT_CARD
          args:
            use_local: true
          policy: mask
          severity: medium
        - id: prompt_injection
          hub: hub://sainatha/prompt_injection_detector
          class_name: PromptInjectionDetector
          hub_runtime: false
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_PROMPT_INJECTION_MODEL:openai_gpt4o_mini}
            threshold: 0.8
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:internal discount code|guaranteed refund without approval)).*$"
            match_type: fullmatch
          policy: block
          severity: high
    output:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: detect_pii
          hub: hub://guardrails/detect_pii
          class_name: DetectPII
          entities:
            - EMAIL_ADDRESS
            - PHONE_NUMBER
            - IP_ADDRESS
            - CREDIT_CARD
          args:
            use_local: true
          policy: mask
          severity: medium
        - id: toxic_language
          hub: hub://guardrails/toxic_language
          class_name: ToxicLanguage
          args:
            threshold: 0.5
            validation_method: sentence
            use_local: true
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:internal discount code|guaranteed refund without approval)).*$"
            match_type: fullmatch
          policy: review_required
          severity: high
        - id: provenance_llm
          hub: hub://guardrails/provenance_llm
          class_name: ProvenanceLLM
          execution: async
          enabled_when: grounding_context_available
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_MODEL:openai_gpt4o_mini}
            validation_method: full
            top_k: 3
          policy: review_required
          severity: high
    action:
      gmail.send:
        high: review_required
        critical: block
        policies:
          toxic_language: block
      whatsapp.send:
        high: review_required
        critical: block
        policies:
          toxic_language: block

  content:
    input:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: prompt_injection
          hub: hub://sainatha/prompt_injection_detector
          class_name: PromptInjectionDetector
          hub_runtime: false
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_PROMPT_INJECTION_MODEL:openai_gpt4o_mini}
            threshold: 0.8
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:unverified medical cure|guaranteed income)).*$"
            match_type: fullmatch
          policy: block
          severity: high
    output:
      validators:
        - id: secrets_present
          hub: hub://guardrails/secrets_present
          class_name: SecretsPresent
          policy: block
          severity: critical
        - id: toxic_language
          hub: hub://guardrails/toxic_language
          class_name: ToxicLanguage
          args:
            threshold: 0.5
            validation_method: sentence
            use_local: true
          policy: block
          severity: high
        - id: forbidden_terms
          hub: hub://guardrails/regex_match
          class_name: RegexMatch
          args:
            regex: "(?is)^(?!.*(?:unverified medical cure|guaranteed income)).*$"
            match_type: fullmatch
          policy: review_required
          severity: high
        - id: provenance_llm
          hub: hub://guardrails/provenance_llm
          class_name: ProvenanceLLM
          enabled_when: grounding_context_available
          args:
            llm_callable: ${WORKFLOW_GUARDRAILS_MODEL:openai_gpt4o_mini}
            validation_method: sentence
            top_k: 3
          policy: review_required
          severity: high
    action:
      publish:
        high: review_required
        critical: block
        policies:
          toxic_language: block
