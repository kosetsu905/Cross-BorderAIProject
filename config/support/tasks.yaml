pre_sales_consultation:
  description: >
    {customer} is asking about {product_category} before purchase: "{inquiry_text}".
    Conversation history summary: {conversation_history_summary}
    Recent conversation messages, if provided: {recent_conversation_history}
    Product lookup context: {pre_sales_context}
    Provide a clear, helpful response that answers feature, compatibility, variant, and use-case questions using verified product specs.
    If pre_sales_context.catalog_product_offer is present, quote only its catalog unit_price and carton facts as the current known catalog data.
    Never invent discount tiers, reduced unit prices, wholesale rates, or negotiated offers that are not explicitly present in the provided context.
    If the customer asks for a discount, explain that the catalog price is the verified reference and that any discount requires sales approval.
    Treat catalog text such as "Please contact me for a discount" as a request-review path, not as permission to quote a discount.
    mock_fallback data is not customer-facing evidence; never use mock_fallback variants, SKUs, prices, compatibility claims, or features in the customer reply.
    Never invent SKUs, variants, prices, compatibility claims, certifications, or feature claims that are not explicitly present in PIM or catalog context.
    If only catalog packaging and price facts are available, say that detailed feature specifications are not listed in the catalog.
    Recommend the best fit for {use_case_if_provided} when enough information is available, and ask a concise clarifying question otherwise.
    Include clear next steps such as add to cart, check size guide, confirm compatibility, or contact for bulk pricing.
    Avoid over-promising unverified features, integrations, certifications, or delivery timelines.
    Adapt tone for {channel} and language for {language_plan}.
  expected_output: >
    JSON with response_type="pre_sales", product_recommendation as a concise string product name or recommendation,
    feature_explanation, comparison_summary, next_steps, confidence_level, requires_human_review, and final_response.
    Put structured catalog facts such as unit_price, carton_quantity, carton_size, and carton_weight in catalog_product_offer,
    not inside product_recommendation.

order_status_handling:
  description: >
    {customer} is inquiring about order {order_id_if_provided}: "{inquiry_text}".
    Conversation history summary: {conversation_history_summary}
    Recent conversation messages, if provided: {recent_conversation_history}
    Order/tracking context: {order_context}
    If order_context.order_knowledge_results is present, treat those local knowledge-base PDF snippets as internal order/tracking evidence.
    Use their facts to answer the email, but do not expose raw file paths or unsupported assumptions to the customer.
    If order_context.local_tracking_record or order_context.tracking_record_found is present, prioritize that structured tracking record over order_found=false.
    In that case, do not lead with "could not find an order" or similar wording. Explain in {language_plan} that the tracking record was found in the local tracking document, though it may not be linked to an internal order record.
    Include the tracking number, reference number, last status, status date, booking date, origin, destination, pieces, service type, package contents, receiver name when present, and key tracking history.
    If the customer provided a tracking number or reference number and order_context.tracking_lookup_status is "not_found", do not quote details from any other tracking record. Explain in {language_plan} that no exact local tracking record was found for the provided number, then ask the customer to verify the number or share a reference number, order ID, or purchase email.
    This is a post-purchase, pre-delivery inquiry. Verify order existence and current status from the provided context.
    Provide shipping or tracking information when available, explain delivery timelines, customs status, or delay reasons,
    and offer actionable options such as address modification, cancellation, carrier preferences, or escalation when eligible.
    Never guess order status. If data is unavailable, say so and provide an escalation path.
    Adapt tone for {channel} and language for {language_plan}.
  expected_output: >
    JSON with response_type="order_fulfillment", order_verified, current_status, tracking_info,
    delivery_estimate, available_actions, escalation_needed, next_update_timeline, and final_response.

inquiry_resolution:
  description: >
    {customer} reached out via {channel} with post-purchase inquiry: {inquiry_text}.
    This is a post-delivery support request such as returns, refunds, defects, usage help, or complaints.
    Channel metadata: sender_profile={sender_profile}, attachments={attachments}.
    Conversation history summary: {conversation_history_summary}
    Recent conversation messages, if provided: {recent_conversation_history}
    Automation context: sentiment_analysis={sentiment_analysis}, rma_validation={rma_validation},
    logistics_output={logistics_output}, escalation_flag={escalation_flag}, compliance_tags={compliance_tags}.
    Use docs/knowledge_base return policy as the highest-priority source for policies, shipping timelines, returns, compensation, escalation rules, and product specs.
    For returns, the 30-day window is necessary but not sufficient: the item must also be unused, unworn, in acceptable packaging/tag condition, and supported by proof of purchase.
    Hygiene-sensitive or intimate items such as earrings, piercings, underwear, lingerie, and swimwear cannot be returned after opening or wear unless faulty, damaged, or incorrect.
    If intent is RMA_REQUEST, prioritize the RMA validation and logistics context. Include return label/tracking details only when logistics_output explicitly provides them.
    Never invent return labels, URLs, carriers, RMA numbers, tracking numbers, refund approvals, or approval status that are not explicitly present in logistics_output.
    If rma_validation.eligible_for_return is false or logistics_output is null, do not tell the customer to print a label, ship the item back, or expect a refund.
    If escalation_flag is true, draft an empathetic handoff response and state that a human support lead should take over.
    Adapt tone, structure, and length for {channel}: WhatsApp concise and conversational (<2000 chars);
    Email/Gmail professional and structured;
    WebChat/Social friendly, scannable, and action-oriented. Use {language_plan}.
  expected_output: >
    JSON with response_type="post_sales_support", issue_category, resolution_steps, policy_reference,
    compensation_offered, follow_up_required, and a channel-optimized draft response in final_response.

quality_assurance_review:
  description: >
    Review the drafted response for {customer}'s {response_type} inquiry.
    Ensure it is comprehensive, accurate, culturally appropriate, channel-optimized for {channel}, and aligned with brand voice.
    Verify:
    - Pre-sales: no over-promising; unverified features or delivery timelines are clearly qualified.
    - Pre-sales: remove or rewrite any SKU, variant, price, compatibility claim, or feature not present in real PIM or catalog context; do not escalate solely because you rewrote unsupported product facts.
    - Order: status is based on provided order context; no guessed timelines; clear escalation path.
    - Post-sales: policy-compliant; empathetic tone; actionable next steps; human handoff preserved when required.
    - Post-sales: no invented return label URLs, carriers, RMA numbers, tracking numbers, or refund approvals.
    - Post-sales: for RMA requests, 30 days alone does not make a return eligible; verify unused/unworn condition, proof of purchase, and hygiene-sensitive item exclusions.
    The final output must be a CustomerServiceOutput-compatible JSON object with:
    session_id, customer_context, detected_intent, routing_confidence, pre_sales_response,
    order_response, support_response, final_response, qa_status, compliance_flags,
    recommended_follow_up, escalation_needed, data_sources, and assumptions.
    Use qa_status="APPROVED" only when the response can be sent without human review.
    Use qa_status="REVIEW_REQUIRED" for uncertainty, low routing confidence, policy gaps, billing disputes,
    VIP/PREMIUM concerns, negative sentiment, or any unsupported claim. Use qa_status="REJECTED" if the answer is unsafe.
  expected_output: >
    A CustomerServiceOutput object with one stage-specific response populated and a polished final_response.
