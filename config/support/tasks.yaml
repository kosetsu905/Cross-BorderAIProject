pre_sales_consultation:
  description: >
    {customer} is asking about {product_category} before purchase: "{inquiry_text}".
    Conversation history, if provided: {conversation_history}
    Product lookup context: {pre_sales_context}
    Provide a clear, helpful response that answers feature, compatibility, variant, and use-case questions using verified product specs.
    Recommend the best fit for {use_case_if_provided} when enough information is available, and ask a concise clarifying question otherwise.
    Include clear next steps such as add to cart, check size guide, confirm compatibility, or contact for bulk pricing.
    Avoid over-promising unverified features, integrations, certifications, or delivery timelines.
    Adapt tone for {channel} and language for {language_plan}.
  expected_output: >
    JSON with response_type="pre_sales", product_recommendation, feature_explanation, comparison_summary,
    next_steps, confidence_level, requires_human_review, and final_response.

order_status_handling:
  description: >
    {customer} is inquiring about order {order_id_if_provided}: "{inquiry_text}".
    Conversation history, if provided: {conversation_history}
    Order/tracking context: {order_context}
    This is a post-purchase, pre-delivery inquiry. Verify order existence and current status from the provided context.
    Provide shipping or tracking information when available, explain delivery timelines, customs status, or delay reasons,
    and offer actionable options such as address modification, cancellation, carrier preferences, or escalation when eligible.
    Never guess order status. If data is unavailable, say so and provide an escalation path.
    Adapt tone for {channel} and language for {language_plan}.
  expected_output: >
    JSON with response_type="order_fulfillment", order_verified, current_status, tracking_info,
    delivery_estimate, available_actions, escalation_needed, next_update_timeline, and final_response.

inquiry_resolution:
  description: >
    {customer} reached out via {channel} with post-purchase inquiry: {inquiry_text}.
    This is a post-delivery support request such as returns, refunds, defects, usage help, or complaints.
    Channel metadata: sender_profile={sender_profile}, attachments={attachments}.
    Conversation history, if provided: {conversation_history}
    Automation context: sentiment_analysis={sentiment_analysis}, rma_validation={rma_validation},
    logistics_output={logistics_output}, escalation_flag={escalation_flag}, compliance_tags={compliance_tags}.
    Use the internal Support Knowledge Base first for policies, shipping timelines, returns, compensation, escalation rules, and product specs.
    If intent is RMA_REQUEST, prioritize the RMA validation and logistics context. Include return label/tracking details only when present.
    If escalation_flag is true, draft an empathetic handoff response and state that a human support lead should take over.
    Adapt tone, structure, and length for {channel}: WhatsApp concise and conversational (<2000 chars);
    Email/Gmail professional and structured;
    WebChat/Social friendly, scannable, and action-oriented. Use {language_plan}.
  expected_output: >
    JSON with response_type="post_sales_support", issue_category, resolution_steps, policy_reference,
    compensation_offered, follow_up_required, and a channel-optimized draft response in final_response.

quality_assurance_review:
  description: >
    Review the drafted response for {customer}'s {response_type} inquiry.
    Ensure it is comprehensive, accurate, culturally appropriate, channel-optimized for {channel}, and aligned with brand voice.
    Verify:
    - Pre-sales: no over-promising; unverified features or delivery timelines are clearly qualified.
    - Order: status is based on provided order context; no guessed timelines; clear escalation path.
    - Post-sales: policy-compliant; empathetic tone; actionable next steps; human handoff preserved when required.
    The final output must be a CustomerServiceOutput-compatible JSON object with:
    session_id, customer_context, detected_intent, routing_confidence, pre_sales_response,
    order_response, support_response, final_response, qa_status, compliance_flags,
    recommended_follow_up, escalation_needed, data_sources, and assumptions.
    Use qa_status="APPROVED" only when the response can be sent without human review.
    Use qa_status="REVIEW_REQUIRED" for uncertainty, low routing confidence, policy gaps, billing disputes,
    VIP/PREMIUM concerns, negative sentiment, or any unsupported claim. Use qa_status="REJECTED" if the answer is unsafe.
  expected_output: >
    A CustomerServiceOutput object with one stage-specific response populated and a polished final_response.
